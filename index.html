<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫畫王國 | 量子占星漫畫屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #fdfcfb; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .gradient-text { background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="text-stone-900">

    <header class="py-12 text-center">
        <h1 class="text-4xl md:text-6xl font-black mb-4 serif">首發主打：達文西版《唐吉訶德》</h1>
        <div class="h-1 w-20 bg-amber-600 mx-auto"></div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-20">
        <div class="bg-white p-4 rounded-3xl shadow-2xl mb-12 border border-stone-100">
            <div class="flex items-center justify-center bg-stone-50 rounded-2xl overflow-hidden min-h-[400px]">
                <img src="cover.jpg" class="max-w-full h-auto object-contain" alt="唐吉訶德">
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-12 items-start">
            <div class="space-y-6">
                <h2 class="text-3xl font-bold serif gradient-text">極致藝術與 AI 的碰撞</h2>
                <ul class="space-y-4 text-stone-600">
                    <li class="flex items-center">✓ 500 年前的古典油畫質感</li>
                    <li class="flex items-center">✓ 結合現代遊戲直播的動態張力</li>
                    <li class="flex items-center">✓ 解鎖從異世界歸來的小鴨劇情</li>
                </ul>
            </div>

            <div class="bg-amber-50 p-8 rounded-3xl border border-amber-200 shadow-inner">
                <h3 class="text-xl font-bold mb-2 text-center text-amber-900">支持原創計畫</h3>
                <p class="text-center text-stone-500 mb-6 text-sm">解鎖全集 50 幅數位珍藏原畫</p>
                <div class="text-center mb-6">
                    <span class="text-4xl font-black text-amber-700">NT$ 299</span>
                </div>

                <div id="paypal-button-container"></div>
            </div>
        </div>
    </main>

    <script src="https://www.paypal.com/sdk/js?client-id=AegB_AB_G-TqcIagVIm3U25mMSH0dp32hyn2LvmQIg17TOCW1oE0cUsmeOF1RGpEQHevsoLJs7V6PFqz&currency=TWD"></script>

    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '299'
                        },
                        description: '漫畫王國：50幅珍藏原畫 (NT$299)'
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('交易成功！感謝您的支持，' + details.payer.name.given_name + '！');
                    // 這裡可以跳轉到您的漫畫下載頁面
                    // window.location.href = "/success.html";
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
