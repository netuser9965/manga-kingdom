<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫畫王國 | 達文西風格經典重現</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        .gradient-text { background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .coming-soon-btn { background: #3f3f37; cursor: not-allowed; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans">

    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute z-30 p-5 text-center">
            <div class="inline-block px-4 py-1 mb-4 text-sm font-bold text-white bg-red-600 rounded-full animate-pulse">LIVE NOW</div>
            <h1 class="text-5xl md:text-7xl font-black mb-4 gradient-text">漫畫王國</h1>
            <p class="text-xl md:text-2xl font-light tracking-widest text-stone-600">當遊戲直播遇見達文西油畫</p>
        </div>
        <div class="absolute inset-0 z-10 bg-black opacity-30"></div>
        <video autoplay muted loop playsinline class="absolute z-0 w-auto min-w-full min-h-full max-w-none">
            <source src="您的影片連結.mp4" type="video/mp4">
        </video>
    </header>

    <section class="py-20 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold mb-4">首發主打：達文西版《唐吉訶德》</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div class="da-vinci-card p-4 bg-white rounded-2xl shadow-xl border border-stone-200">
                <div class="aspect-[3/4] bg-stone-100 rounded-lg flex items-center justify-center text-stone-400">
                    <p>🎨 達文西風格插畫加載中...</p>
                </div>
            </div>
            <div class="space-y-6">
                <h3 class="text-2xl font-bold">極致藝術與 AI 的碰撞</h3>
                <ul class="space-y-4 text-stone-600">
                    <li>✓ 500 年前的古典油畫質感</li>
                    <li>✓ 結合現代遊戲直播的動態張力</li>
                    <li>✓ 全球首創：經典文學的二次元重生</li>
                </ul>
                
                <div class="pt-8">
                    <button disabled class="coming-soon-btn w-full py-4 text-white text-center rounded-full text-xl font-bold shadow-lg opacity-80">
                        🔒 產品籌備中 (NT$299)
                    </button>
                    <p class="text-xs text-center mt-4 text-amber-600 font-bold">即將開賣！帶上帳密後一鍵解鎖</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-10 bg-stone-900 text-stone-400 text-center text-sm">
        <p>&copy; 2026 漫畫王國 Manga Kingdom</p>
    </footer>

</body>
</html>
